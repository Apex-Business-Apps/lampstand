name: Deploy Worker Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build app
        env:
          VITE_SUPABASE_URL: "https://jfqivpqedhmgyqwqpwim.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "sb_publishable_mEfQxgtJ7WzxVnHfiAMwzA_gpfNHM4k"
        run: npm run build

      - name: Deploy Worker with custom domains
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.production.toml
