name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - work

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15 # match Cloudflare build image toolchain

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Production build
        run: bun run build
