name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - work

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit (block high/critical in production deps)
        run: npm audit --omit=dev

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --run

      - name: Production build
        run: npm run build

      - name: Worker bundle (dry-run)
        run: npx wrangler deploy --dry-run --config wrangler.json

      - name: Verify PWA manifest and icons exist in build output
        run: |
          test -f dist/manifest.json || (echo "ERROR: manifest.json missing from build output" && exit 1)
          test -f dist/icons/icon-192.png || (echo "ERROR: icon-192.png missing from build output" && exit 1)
          test -f dist/icons/icon-512.png || (echo "ERROR: icon-512.png missing from build output" && exit 1)
          echo "PWA artifacts verified"

      - name: Verify no private API keys in bundle
        run: |
          if grep -r "GROQ_API_KEY\|xi-api-key\|sk-" dist/assets/ --include="*.js" 2>/dev/null; then
            echo "ERROR: Potential private API key found in bundle"
            exit 1
          fi
          echo "Bundle key scan passed"
