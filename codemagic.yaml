# codemagic.yaml — Lampstand Mobile CI/CD
# App ID:  icu.thelampstand.app
# Route:   Codemagic cloud Mac M2 (iOS) + Linux (Android) → TestFlight / Play Internal
# No local Mac or Android SDK required — Codemagic provides all native build infrastructure.
# ios/ and android/ directories are NOT committed to the repo.
# Codemagic generates them via "npx cap add ios/android" on first build, then syncs.
#
# ── Required environment variables (Codemagic UI → Teams → Global variables) ──
# iOS signing (configure via Codemagic Code Signing tab — do NOT hardcode):
#   APP_STORE_CONNECT_ISSUER_ID         App Store Connect API key issuer UUID
#   APP_STORE_CONNECT_KEY_IDENTIFIER    Key ID (e.g. ABC1234567)
#   APP_STORE_CONNECT_PRIVATE_KEY       Contents of the .p8 file (multiline secret)
#   CERTIFICATE_PRIVATE_KEY             RSA private key matching your iOS dist certificate
# Android signing (reference keystore "lampstand_keystore" in Codemagic UI):
#   CM_KEYSTORE                         base64-encoded .jks keystore (upload via UI)
#   CM_KEY_ALIAS                        Key alias inside the keystore
#   CM_KEYSTORE_PASSWORD                Keystore password
#   CM_KEY_PASSWORD                     Key password
#   GCLOUD_SERVICE_ACCOUNT_CREDENTIALS  Google Play service account JSON (for publishing)
# Web build (injected into Vite at build time):
#   VITE_SUPABASE_URL                   https://<project-ref>.supabase.co
#   VITE_SUPABASE_PUBLISHABLE_KEY       Supabase anon/publishable key

definitions:
  steps:
    - &step_install
      name: Install npm dependencies
      script: npm ci --ignore-scripts

    - &step_build_web
      name: Build Vite web app
      script: |
        export VITE_SUPABASE_URL=$VITE_SUPABASE_URL
        export VITE_SUPABASE_PUBLISHABLE_KEY=$VITE_SUPABASE_PUBLISHABLE_KEY
        npm run build

workflows:

  # ═══════════════════════════════════════════════════════════
  # iOS — TestFlight Internal Testing
  # Codemagic provides the Mac Mini M2. No local Mac required.
  # ═══════════════════════════════════════════════════════════
  ios-testflight-internal:
    name: iOS → TestFlight Internal
    max_build_duration: 90
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true

    environment:
      node: 22.x
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: icu.thelampstand.app
      vars:
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
        CERTIFICATE_PRIVATE_KEY: $CERTIFICATE_PRIVATE_KEY

    scripts:
      - *step_install
      - *step_build_web

      - name: Generate iOS native project
        # ios/ is not committed. Codemagic's Mac Mini M2 generates it here.
        # Idempotent: skips if ios/ somehow exists from a cached workspace.
        # cap add ios also runs "pod install" via cap sync chain.
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor to iOS (copies dist + plugins into Xcode project)
        script: npx cap sync ios

      - name: Patch Info.plist — inject required usage descriptions
        # NSMicrophoneUsageDescription: required for Whisper STT (Xenova/whisper-tiny.en).
        # NSSpeechRecognitionUsageDescription: required for SFSpeechRecognizer on iOS.
        # App Store Review WILL reject without these — injection here avoids committing
        # generated ios/ files to source control.
        script: |
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c \
            "Add :NSMicrophoneUsageDescription string 'LampStand uses your microphone only when you choose to speak a prayer or question. Audio is processed on-device and never stored.'" \
            "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c \
            "Set :NSMicrophoneUsageDescription 'LampStand uses your microphone only when you choose to speak a prayer or question. Audio is processed on-device and never stored.'" \
            "$PLIST"
          /usr/libexec/PlistBuddy -c \
            "Add :NSSpeechRecognitionUsageDescription string 'LampStand uses on-device speech recognition to transcribe your spoken prayers. No audio leaves your device.'" \
            "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c \
            "Set :NSSpeechRecognitionUsageDescription 'LampStand uses on-device speech recognition to transcribe your spoken prayers. No audio leaves your device.'" \
            "$PLIST"

      - name: Set version name and build number
        script: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          cd ios/App
          agvtool new-marketing-version "$CURRENT_VERSION"
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Generate ExportOptions.plist
        # ExportOptions.plist is not committed — generated fresh each build
        # from the signing identity Codemagic resolves via ios_signing above.
        script: |
          cat > ios/App/ExportOptions.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$(DEVELOPMENT_TEAM)</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST_EOF

      - name: Apply Codemagic provisioning profiles
        script: xcode-project use-profiles

      - name: Build and archive iOS app
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=YES \
            archive | xcpretty

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/App.xcarchive" \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/ipa" \
            | xcpretty

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - $CM_BUILD_DIR/App.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
      email:
        recipients:
          - aspiral.icu@gmail.com
        notify:
          success: true
          failure: true

  # ═══════════════════════════════════════════════════════════
  # Android — Google Play Internal Testing (AAB)
  # Runs on Codemagic Linux x2 — no local Android SDK needed.
  # ═══════════════════════════════════════════════════════════
  android-play-internal:
    name: Android → Play Store Internal
    max_build_duration: 60
    instance_type: linux_x2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true

    environment:
      node: 22.x
      android_signing:
        - lampstand_keystore
      vars:
        CM_KEY_ALIAS: $CM_KEY_ALIAS
        CM_KEYSTORE_PASSWORD: $CM_KEYSTORE_PASSWORD
        CM_KEY_PASSWORD: $CM_KEY_PASSWORD

    scripts:
      - *step_install
      - *step_build_web

      - name: Generate Android native project
        # android/ is not committed. Codemagic's Linux runner generates it here.
        # Idempotent: skips if android/ exists from a cached workspace.
        script: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor to Android (copies dist + plugins into Gradle project)
        script: npx cap sync android

      - name: Set versionCode and versionName
        script: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          sed -i \
            "s/versionCode [0-9]*/versionCode $BUILD_NUMBER/" \
            android/app/build.gradle
          sed -i \
            "s/versionName \"[^\"]*\"/versionName \"$CURRENT_VERSION\"/" \
            android/app/build.gradle

      - name: Build release AAB
        # AAB (not APK) is required for Play Store submission (2021+ requirement).
        script: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: false
      email:
        recipients:
          - aspiral.icu@gmail.com
        notify:
          success: true
          failure: true

  # ═══════════════════════════════════════════════════════════
  # PR Quality Gate — lint + typecheck + tests + build
  # Fast, no signing, no native projects, triggers on every PR to main
  # ═══════════════════════════════════════════════════════════
  pr-validation:
    name: PR Quality Gate
    max_build_duration: 20
    instance_type: linux_x2

    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: main
          include: true

    environment:
      node: 22.x

    scripts:
      - *step_install
      - name: Lint
        script: npm run lint
      - name: Type check
        script: npm run typecheck
      - name: Unit tests
        script: npm run test -- --run
      - name: Production build (smoke test)
        script: |
          export VITE_SUPABASE_URL=https://placeholder.supabase.co
          export VITE_SUPABASE_PUBLISHABLE_KEY=placeholder
          npm run build
